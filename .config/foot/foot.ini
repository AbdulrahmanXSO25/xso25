# Foot — Glass Terminal for Niri
# Catppuccin Mocha colors + native Wayland blur

[main]
term=foot
font=JetBrainsMono Nerd Font:size=11
dpi-aware=no
alpha=0.78
blur=true

include=~/.config/foot/catppuccin-mocha.ini

[scrollback]
lines=2000

[cursor]
style=beam
color=f5c2e7

[mouse]
hide-when-typing=yes

[bell]
urgent=no

[url]
launch=xdg-open
osc8-underline=always
