# Niri Environment Variables — read by systemd user manager
# This ensures all spawned processes inherit these variables.
# https://www.freedesktop.org/software/systemd/man/latest/environment.d.html

XDG_CURRENT_DESKTOP=niri
XDG_SESSION_DESKTOP=niri
XDG_SESSION_TYPE=wayland

# Qt
QT_QPA_PLATFORM=wayland;xcb
QT_QPA_PLATFORMTHEME=qt6ct
QT_WAYLAND_DISABLE_WINDOWDECORATION=1
QT_AUTO_SCREEN_SCALE_FACTOR=1

# GDK (GTK)
GDK_BACKEND=wayland,x11,*

# Clutter
CLUTTER_BACKEND=wayland

# Mozilla (Firefox)
MOZ_ENABLE_WAYLAND=1

# Ozone (Electron/Chromium apps)
OZONE_PLATFORM=wayland
ELECTRON_OZONE_PLATFORM_HINT=wayland

# SDL2
SDL_VIDEODRIVER=wayland

# Cursor
XCURSOR_SIZE=24

# Java
_JAVA_AWT_WM_NONREPARENTING=1
